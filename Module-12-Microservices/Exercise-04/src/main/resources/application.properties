server.port=8086
spring.application.name=payment-service

resilience4j.circuitbreaker.instances.paymentCircuitBreaker.sliding-window-size=5
resilience4j.circuitbreaker.instances.paymentCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentCircuitBreaker.wait-duration-in-open-state=10000
resilience4j.circuitbreaker.instances.paymentCircuitBreaker.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.paymentCircuitBreaker.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.paymentCircuitBreaker.automatic-transition-from-open-to-half-open-enabled=true

management.endpoints.web.exposure.include=health,circuitbreakers
